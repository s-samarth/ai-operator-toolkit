<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="4" fill="#0B0E14"/>

  <!-- Outer circle ring -->
  <circle cx="16" cy="16" r="12" stroke="#C4835B" stroke-width="1.5" fill="none"/>

  <!-- Inner circle -->
  <circle cx="16" cy="16" r="3.5" stroke="#C4835B" stroke-width="1.2" fill="none"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.2" fill="#C4835B"/>

  <!-- Crosshair lines — top -->
  <line x1="16" y1="4" x2="16" y2="11" stroke="#C4835B" stroke-width="1.5" stroke-linecap="square"/>
  <!-- Crosshair lines — bottom -->
  <line x1="16" y1="21" x2="16" y2="28" stroke="#C4835B" stroke-width="1.5" stroke-linecap="square"/>
  <!-- Crosshair lines — left -->
  <line x1="4" y1="16" x2="11" y2="16" stroke="#C4835B" stroke-width="1.5" stroke-linecap="square"/>
  <!-- Crosshair lines — right -->
  <line x1="21" y1="16" x2="28" y2="16" stroke="#C4835B" stroke-width="1.5" stroke-linecap="square"/>

  <!-- Corner tick marks at 45° positions -->
  <line x1="8.5" y1="8.5" x2="10.5" y2="10.5" stroke="#C4835B" stroke-width="1" stroke-linecap="square" opacity="0.6"/>
  <line x1="23.5" y1="8.5" x2="21.5" y2="10.5" stroke="#C4835B" stroke-width="1" stroke-linecap="square" opacity="0.6"/>
  <line x1="8.5" y1="23.5" x2="10.5" y2="21.5" stroke="#C4835B" stroke-width="1" stroke-linecap="square" opacity="0.6"/>
  <line x1="23.5" y1="23.5" x2="21.5" y2="21.5" stroke="#C4835B" stroke-width="1" stroke-linecap="square" opacity="0.6"/>
</svg>
